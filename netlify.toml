[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Vite defaults to 5173; Netlify auto-detects TanStack Router as port 3000 without this
[dev]
  command = "npm run dev:vite"
  targetPort = 5173
  port = 8888
  framework = "vite"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Prevent search engines from indexing non-production deploys
[context.deploy-preview]
  [[headers]]
    for = "/*"
    [headers.values]
      X-Robots-Tag = "noindex, nofollow"

[context.branch-deploy]
  [[headers]]
    for = "/*"
    [headers.values]
      X-Robots-Tag = "noindex, nofollow"
